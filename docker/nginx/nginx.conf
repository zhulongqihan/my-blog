worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 223.5.5.5 119.29.29.29 ipv6=off valid=300s;
    resolver_timeout 10s;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss
               image/svg+xml;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    server {
        listen 80;
        server_name localhost cyruszhang.online www.cyruszhang.online 118.31.221.81;

        access_log /var/log/nginx/access.log main;
        error_log  /var/log/nginx/error.log warn;

        # ===== 前台静态文件 (React) =====
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ===== 管理后台 (Vue) =====
        location /admin/ {
            alias /usr/share/nginx/html/admin/;
            try_files $uri $uri/ /admin/index.html;
        }

        # ===== 后端 API 代理 =====
        # backend 是 docker-compose 中的服务名，Docker 网络自动解析
        location /api/ {
            proxy_pass http://backend:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 文件上传限制
            client_max_body_size 10m;
        }

        # ===== AI API 代理（通义千问 DashScope OpenAI 兼容接口，SSE 流式） =====
        # Nginx 注入 Authorization，前端不暴露 Key
        location /ai-api/ {
            proxy_pass https://dashscope.aliyuncs.com/compatible-mode/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host dashscope.aliyuncs.com;
            proxy_ssl_server_name on;
            proxy_ssl_name dashscope.aliyuncs.com;
            proxy_set_header Authorization "Bearer ${DASHSCOPE_API_KEY}";
            proxy_set_header Content-Type "application/json";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE 必须关闭缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 30s;

            add_header Cache-Control no-cache;
        }

        # ===== WebSocket 代理 (STOMP + SockJS) =====
        location /ws {
            proxy_pass http://backend:8080/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ===== 上传文件静态资源 =====
        location /uploads/ {
            alias /usr/share/nginx/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
